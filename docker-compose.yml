#check root env-example before running
services:

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always  


  api-gateway: 
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./api-gateway/.env  
    environment:
      - "REDIS_HOST=redis"  
      - "REDIS_PORT=6379"  
      - "AUTH_SERVICE_URL=http://auth-service:8081"
    depends_on:
      - redis


  auth-service:
    build: 
      context: ./auth-service
      dockerfile: Dockerfile
    expose:
      - 8081
    env_file:
     - ./auth-service/.env
    environment:
      DB_URL: ${AUTH_DB}

    